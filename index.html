<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <header>
    <div class="logo-section">
        <img src="images/icon.jpg" alt="Icon">
        <div class="title-section">
            <h1>To Do List</h1>
            <p>You can manage your tasks here</p>
        </div>
    </div>
    </header>
    
    <div class="task-section">
        <input type="text" id="taskInput" placeholder="Enter your task here">
        <input type="button" id= "addButton" value="Add task">
    </div>

    <div class="search-section">
        <input type="text" id = "searchInput" placeholder="Search Tasks">
        <div class="filter">
            <img src="images/Filter.png" alt="Filter" height="20" width="20" style="vertical-align: middle;  mix-blend-mode: multiply;">
            <input type="button" id="allButton" class="active" value="All">
            <input type="button" id="activeButton" value="Active">
            <input type="button" id="completedButton" value="Completed">
        </div>
    </div>

    <ul id="taskList">
    </ul>

    <div id="emptyState">
        <h2>No tasks yet</h2>
        <p>Add your first task</p>
    </div>

    <footer>

        <div class="footer-card">
            <h3>Completed Tasks</h3>
            <p id="completed-task"></p>
        </div>

        <div class="footer-card">
            <h3>Remaining Tasks</h3>
            <p id="left-task"></p>
        </div>      
    </footer>
    
    <script src="script.js">

    </script>
</body>
</html>
