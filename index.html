<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header><img src="images/icon.jpg" alt="Icon" height="70" width="100" style="vertical-align: middle; mix-blend-mode: multiply;">
            <h1 style="display: inline-block; vertical-align: middle;">To Do List </h1>
            <p> You can manage your tasks here </p>
    </header>
    
    <div class="task-section">
        <input type="text" placeholder="Enter your task here">
        <input type="button" class= "add-button" value="Add task">
    </div>

    <div class="search-section">
        <input type="text" placeholder="Search Tasks">
        <div class="filter">
            <img src="images/Filter.png" alt="Filter" height="20" width="20" style="vertical-align: middle;  mix-blend-mode: multiply;">
            <input type="button" value="All">
            <input type="button" value="Active">
            <input type="button" value="Completed">
        </div>
    </div>

    <ul class="task-list">
        <li>
            <input type="checkbox" id="task1">
            <label for="task1"> Complete HTML </label>
            <input type="button" value="Edit">
            <input type="button" value="Delete">
        </li>
        <li>
            <input type="checkbox" id="task2">
            <label for="task2"> Complete CSS </label>
            <input type="button" value="Edit">
            <input type="button" value="Delete">
        </li>
    </ul>

    <footer>
        <div>
            <p>Tasks Completed : </p>
        </div>
        <div>
            <p>Tasks left :</p>
        </div>
    </footer>
    
</body>
</html>
